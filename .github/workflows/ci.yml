name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # macOS: deps via Homebrew. Runs the full suite (unit + integration against a
  # dev server) and a downstream find_package() smoke test of the install tree.
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake grpc protobuf nlohmann-json temporal

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build build -j3

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure -LE integration

      - name: Install + downstream find_package smoke test
        run: |
          cmake --install build --prefix "$RUNNER_TEMP/tcpp-install"
          cmake -S tests/packaging -B "$RUNNER_TEMP/consumer" \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/tcpp-install"
          cmake --build "$RUNNER_TEMP/consumer"

      - name: Start Temporal dev server
        run: |
          temporal server start-dev --headless --log-level error &
          echo $! > /tmp/temporal.pid
          for i in $(seq 1 60); do
            temporal workflow list >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Integration tests
        env:
          TEMPORAL_INTEGRATION: "1"
        run: ctest --test-dir build --output-on-failure -L integration

      - name: Stop Temporal dev server
        if: always()
        run: kill "$(cat /tmp/temporal.pid)" 2>/dev/null || true

  # Linux via Conan. The SDK consumes its deps through find_package(... CONFIG),
  # and Debian/Ubuntu's protobuf/gRPC packages ship pkg-config files but no CMake
  # config packages — so Conan supplies the toolchain deps (with their config
  # packages) instead. This proves the SDK builds off macOS and exercises
  # conanfile.py end to end on a clean machine.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolchain + Conan
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake make g++
          pip install "conan>=2.0,<3"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan2-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan2-${{ runner.os }}-

      - name: Build the SDK via Conan
        run: |
          conan profile detect --force
          conan install . --build=missing -s build_type=Release
          cmake --preset conan-release
          cmake --build --preset conan-release
